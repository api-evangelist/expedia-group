aid: expedia-group
name: Expedia Group
description: Expedia Group is an American travel technology company that owns and operates travel fare
  aggregators and travel metasearch engines, including Expedia, Hotels.com, Vrbo, Travelocity, Hotwire.com,
  Orbitz, Ebookers, CheapTickets, CarRentals.com, and Trivago. Their developer platform provides APIs
  for travel inventory, lodging, and analytics.

      description: The property's check-out information.
    BusinessModel:
      type: object
      properties:
        expedia_collect:
          type: boolean
          description: Whether or not a payment for this property can be taken by Expedia at the time of booking.
        property_collect:
          type: boolean
          description: Whether or not a payment for this property can be taken by the property upon arrival.
      description: How and when the payment can be taken.
    MaxAllowed:
      type: object
      properties:
        total:
          type: number
          description: Total maximum occupancy allowed.
        children:
          type: number
          description: Maximum number of children allowed.
        adults:
          type: number
          description: Maximum number of adults allowed.
      description: Maximum occupancy counts.

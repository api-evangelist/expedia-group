        date.<br><br>

        When there are a large number of properties in the response, it will be paginated. See the `Link` header in the

        200 response section.

        '
      operationId: getInactiveProperties
      parameters:
      - name: Accept
        in: header
        description: 'Specifies the response format that the client would like to receive back. This must be `application/json`.

          '
        required: true
        schema:
          type: string
        example: application/json
      - name: Accept-Encoding
        in: header
        description: 'Specifies the response encoding that the client would like to receive back. This must be `gzip`.

          '
        required: true
        schema:
          type: string
        example: gzip
      - name: User-Agent
        in: header
        description: "The `User-Agent` header string from the customer's request, as captured by your integration. If you are \nbuilding an application then the `User-Agent` value should be `{app name}/{app version}`.\n"
        required: true
        schema:
          type: string
        example: TravelNow/3.30.112
      - name: Customer-Session-Id
        in: header
        description: 'Insert your own unique value for each user session, beginning with the first API call. Continue to pass the same

          value for each subsequent API call during the user''s session, using a new value for every new customer session.<br>

          Including this value greatly eases EPS''s internal debugging process for issues with partner requests,

          as it explicitly links together request paths for individual user''s session.

          '
        schema:
          type: string
      - name: since
        in: query
        description: 'Required on initial call, not accepted on subsequent paging links provided in response header.<br>

